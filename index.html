<!DOCTYPE html>
<html>
<head>
<title>FarmSaathi</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:linear-gradient(to right,#56ab2f,#a8e063);
  text-align:center;
  margin:0;
}
h1{color:white;margin-top:20px;}

.container{
  background:white;
  width:90%;
  max-width:420px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 10px gray;
}

.input-group{
  display:flex;
  align-items:center;
  margin:6px;
}

.input-group input{
  flex:1;
  padding:10px;
  border-radius:5px;
  border:1px solid gray;
}

.voiceBtn{
  padding:8px;
  margin-left:5px;
  border-radius:50%;
  background:#ffcc00;
  cursor:pointer;
}

input,select{
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:5px;
  border:1px solid gray;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:5px;
  background:green;
  color:white;
  cursor:pointer;
  margin:5px;
}

table{
  width:95%;
  margin:auto;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th{background:green;color:white;padding:10px;}
td{padding:8px;border:1px solid #ccc;}

.profit{color:green;font-weight:bold;}
.loss{color:red;font-weight:bold;}

.summary,#topCropBox{
  background:white;
  width:90%;
  max-width:350px;
  margin:auto;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 3px 8px gray;
}

.status{
  font-size:12px;
  color:gray;
}
</style>
</head>

<body>

<h1 id="title"></h1>
<p id="subtitle" style="color:white"></p>

<button onclick="setEnglish()">English</button>
<button onclick="setKannada()">ಕನ್ನಡ</button>

<div class="container">

<div class="input-group">
<input type="text" id="village">
<button class="voiceBtn" onclick="startListening('village')">🎤</button>
</div>

<div class="input-group">
<input type="text" id="crop">
<button class="voiceBtn" onclick="startListening('crop')">🎤</button>
</div>

<p class="status" id="voiceStatus"></p>

<select id="season"></select>

<h3 id="expenseLabel"></h3>
<input type="number" id="seeds">
<input type="number" id="fertilizer">
<input type="number" id="labour">
<input type="number" id="irrigation">

<h3 id="marketLabel"></h3>
<input type="number" id="quantity">
<input type="number" id="rate">

<button id="addBtn" onclick="addRecord()"></button>
<button id="clearBtn" onclick="clearForm()"></button>

</div>

<div class="summary">
<h3 id="totalLabel"></h3>
</div>

<table>
<thead>
<tr>
<th id="thVillage"></th>
<th id="thCrop"></th>
<th id="thSeason"></th>
<th id="thExpense"></th>
<th id="thIncome"></th>
<th id="thProfit"></th>
<th id="thAction"></th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<div id="topCropBox"></div>

<script>

let currentLang="en";
let records=JSON.parse(localStorage.getItem("farmData"))||[];

const seasons={
  en:["Kharif","Rabi","Zaid"],
  kn:["ಖರಿಫ್","ರಬಿ","ಜೈದ್"]
};

const t={
  en:{
    title:"🌾 FarmSaathi",
    subtitle:"Crop Expense & Profit Tracker",
    village:"Village (type or 🎤)",
    crop:"Crop (type or 🎤)",
    expense:"Expense",
    market:"Market",
    seeds:"Seeds",
    fertilizer:"Fertilizer",
    labour:"Labour",
    irrigation:"Irrigation",
    quantity:"Quantity",
    rate:"Rate",
    add:"Add",
    clear:"Clear",
    total:"Total Profit",
    top:"Top Crop",
    villageH:"Village",
    cropH:"Crop",
    seasonH:"Season",
    expenseH:"Expense",
    incomeH:"Income",
    profitH:"Profit",
    actionH:"Action"
  },
  kn:{
    title:"🌾 ಫಾರ್ಮ್ ಸಾಥಿ",
    subtitle:"ಬೆಳೆ ವೆಚ್ಚ ಮತ್ತು ಲಾಭ ಟ್ರ್ಯಾಕರ್",
    village:"ಗ್ರಾಮ (ಟೈಪ್ ಅಥವಾ 🎤)",
    crop:"ಬೆಳೆ (ಟೈಪ್ ಅಥವಾ 🎤)",
    expense:"ವೆಚ್ಚ",
    market:"ಮಾರ್ಕೆಟ್",
    seeds:"ಬೀಜ",
    fertilizer:"ರಸಗೊಬ್ಬರ",
    labour:"ಕಾರ್ಮಿಕ",
    irrigation:"ನೀರಾವರಿ",
    quantity:"ಪ್ರಮಾಣ",
    rate:"ದರ",
    add:"ಸೇರಿಸಿ",
    clear:"ಖಾಲಿ ಮಾಡಿ",
    total:"ಒಟ್ಟು ಲಾಭ",
    top:"ಅತ್ಯುತ್ತಮ ಬೆಳೆ",
    villageH:"ಗ್ರಾಮ",
    cropH:"ಬೆಳೆ",
    seasonH:"ಸೀಸನ್",
    expenseH:"ವೆಚ್ಚ",
    incomeH:"ಆದಾಯ",
    profitH:"ಲಾಭ",
    actionH:"ಕ್ರಿಯಾ"
  }
};

function updateLang(){
  let x=t[currentLang];

  title.innerText=x.title;
  subtitle.innerText=x.subtitle;

  village.placeholder=x.village;
  crop.placeholder=x.crop;

  expenseLabel.innerText=x.expense;
  marketLabel.innerText=x.market;

  seeds.placeholder=x.seeds;
  fertilizer.placeholder=x.fertilizer;
  labour.placeholder=x.labour;
  irrigation.placeholder=x.irrigation;

  quantity.placeholder=x.quantity;
  rate.placeholder=x.rate;

  addBtn.innerText=x.add;
  clearBtn.innerText=x.clear;

  totalLabel.innerHTML=x.total+": ₹ <span id='totalProfit'>0</span>";

  thVillage.innerText=x.villageH;
  thCrop.innerText=x.cropH;
  thSeason.innerText=x.seasonH;
  thExpense.innerText=x.expenseH;
  thIncome.innerText=x.incomeH;
  thProfit.innerText=x.profitH;
  thAction.innerText=x.actionH;
}

function startListening(id){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if(!SpeechRecognition){
    voiceStatus.innerText="Voice not supported";
    return;
  }

  const r=new SpeechRecognition();
  r.lang=currentLang==="kn"?"kn-IN":"en-IN";

  voiceStatus.innerText="🎤 Listening...";

  r.start();

  r.onresult=e=>{
    document.getElementById(id).value=e.results[0][0].transcript;
    voiceStatus.innerText="✔ Done";
  };

  r.onerror=e=>{
    voiceStatus.innerText="❌ Use typing";
  };

  r.onend=()=>setTimeout(()=>voiceStatus.innerText="",2000);
}

function addRecord(){
  let c=crop.value,q=+quantity.value,r=+rate.value;
  if(!c||q<=0||r<=0){alert("Enter valid");return;}

  let exp=(+seeds.value||0)+(+fertilizer.value||0)+(+labour.value||0)+(+irrigation.value||0);
  let inc=q*r;
  let p=inc-exp;

  records.push({v:village.value,c, s:season.value,exp,inc,p});
  localStorage.setItem("farmData",JSON.stringify(records));
  display();
  clearForm();
}

function display(){
  tableData.innerHTML="";
  let total=0,top={n:"-",p:-Infinity};

  records.forEach((x,i)=>{
    total+=x.p;
    if(x.p>top.p) top={n:x.c,p:x.p};

    tableData.innerHTML+=`
    <tr>
    <td>${x.v}</td>
    <td>${x.c}</td>
    <td>${x.s}</td>
    <td>₹${x.exp}</td>
    <td>₹${x.inc}</td>
    <td class="${x.p>=0?'profit':'loss'}">₹${x.p}</td>
    <td><button onclick="del(${i})">X</button></td>
    </tr>`;
  });

  totalProfit.innerText=total;
  topCropBox.innerText=t[currentLang].top+": "+top.n;
}

function del(i){
  records.splice(i,1);
  localStorage.setItem("farmData",JSON.stringify(records));
  display();
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

function loadSeason(){
  season.innerHTML="";
  seasons[currentLang].forEach(x=>season.innerHTML+=`<option>${x}</option>`);
}

function setEnglish(){currentLang="en";updateLang();loadSeason();}
function setKannada(){currentLang="kn";updateLang();loadSeason();}

setEnglish();
display();

</script>

</body>
</html>
