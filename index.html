<!DOCTYPE html>
<html>
<head>
<title>FarmSaathi / ಫಾರ್ಮ್ ಸಾಥಿ</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  font-family:Arial;
  background:linear-gradient(to right,#56ab2f,#a8e063);
  text-align:center;
  margin:0;
}
h1{color:white;margin-top:20px;}

.container{
  background:white;
  width:90%;
  max-width:420px;
  margin:auto;
  padding:20px;
  border-radius:10px;
  box-shadow:0 5px 10px gray;
}

.input-group{
  display:flex;
  align-items:center;
  margin:6px;
}

.input-group input{
  flex:1;
  padding:10px;
  border-radius:5px;
  border:1px solid gray;
}

.voiceBtn{
  padding:8px;
  margin-left:5px;
  font-size:16px;
  border-radius:50%;
  cursor:pointer;
  background:#ffcc00;
}

input,select{
  width:90%;
  padding:10px;
  margin:6px;
  border-radius:5px;
  border:1px solid gray;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:5px;
  background:green;
  color:white;
  cursor:pointer;
  margin:5px;
}

table{
  width:95%;
  margin:auto;
  margin-top:20px;
  border-collapse:collapse;
  background:white;
}

th{background:green;color:white;padding:10px;}
td{padding:8px;border:1px solid #ccc;}

.profit{color:green;font-weight:bold;}
.loss{color:red;font-weight:bold;}

.summary, .expense-box, #topCropBox{
  background:white;
  width:90%;
  max-width:350px;
  margin:auto;
  margin-top:20px;
  padding:10px;
  border-radius:10px;
  box-shadow:0 3px 8px gray;
}

#lossAlertPopup{
  display:none;
  position:fixed;
  top:10px;
  left:50%;
  transform:translateX(-50%);
  background:red;
  color:white;
  padding:15px;
  border-radius:8px;
}
</style>
</head>

<body>

<div id="lossAlertPopup"></div>

<h1 id="title">🌾 FarmSaathi</h1>
<p style="color:white">Crop Expense & Profit Tracker</p>

<button onclick="setEnglish()">English</button>
<button onclick="setKannada()">ಕನ್ನಡ</button>

<div class="container">

<div class="input-group">
<input type="text" id="village" placeholder="Village Name">
<button class="voiceBtn" onclick="startListening('village')">🎤</button>
</div>

<div class="input-group">
<input type="text" id="crop" placeholder="Crop Name" oninput="suggestPrice()">
<button class="voiceBtn" onclick="startListening('crop')">🎤</button>
</div>

<select id="season"></select>

<h3>Expense Details</h3>
<input type="number" id="seeds" placeholder="Seeds Cost">
<input type="number" id="fertilizer" placeholder="Fertilizer Cost">
<input type="number" id="labour" placeholder="Labour Cost">
<input type="number" id="irrigation" placeholder="Irrigation Cost">

<h3>Market Details</h3>
<input type="number" id="quantity" placeholder="Quantity (kg)">
<input type="number" id="rate" placeholder="Rate per kg">

<button onclick="addRecord()">Add Record</button>
<button onclick="clearForm()">Clear</button>
<button onclick="resetData()">Reset</button>

</div>

<div class="summary">
<h3>Total Profit: ₹ <span id="totalProfit">0</span></h3>
</div>

<table>
<thead>
<tr>
<th>Village</th>
<th>Crop</th>
<th>Season</th>
<th>Expense</th>
<th>Income</th>
<th>Profit</th>
<th>Action</th>
</tr>
</thead>
<tbody id="tableData"></tbody>
</table>

<div class="expense-box">
<h3>Expense Breakdown</h3>
<p>Seeds: ₹ <span id="seedTotal">0</span></p>
<p>Fertilizer: ₹ <span id="fertTotal">0</span></p>
<p>Labour: ₹ <span id="labourTotal">0</span></p>
<p>Irrigation: ₹ <span id="irrTotal">0</span></p>
</div>

<div id="topCropBox">Top Crop: -</div>

<script>

let currentLang = "en";
let records = JSON.parse(localStorage.getItem("farmData")) || [];

const seasons = {
  en:["Kharif","Rabi","Zaid"],
  kn:["ಖರಿಫ್","ರಬಿ","ಜೈದ್"]
};

const marketPrices = {
  "Rice":25,"Wheat":20,"Maize":18
};

// 🔥 FIXED VOICE FUNCTION
function startListening(inputId){
  const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

  if (!SpeechRecognition) {
    alert("Use Google Chrome for voice input");
    return;
  }

  const recognition = new SpeechRecognition();

  recognition.lang = currentLang === 'kn' ? 'kn-IN' : 'en-IN';
  recognition.interimResults = false;
  recognition.continuous = false;

  try {
    recognition.start();
  } catch(e){}

  recognition.onresult = function(event){
    const text = event.results[0][0].transcript;
    document.getElementById(inputId).value = text;

    if(inputId==="crop") suggestPrice();
  };

  recognition.onerror = function(e){
    alert("Voice error: "+e.error);
  };
}

function suggestPrice(){
  let crop = document.getElementById("crop").value.trim();
  if(marketPrices[crop]){
    document.getElementById("rate").value = marketPrices[crop];
  }
}

function addRecord(){

  let crop=document.getElementById("crop").value;
  let quantity=Number(document.getElementById("quantity").value);
  let rate=Number(document.getElementById("rate").value);

  if(!crop || quantity<=0 || rate<=0){
    alert("Enter valid data");
    return;
  }

  let seeds=+document.getElementById("seeds").value||0;
  let fertilizer=+document.getElementById("fertilizer").value||0;
  let labour=+document.getElementById("labour").value||0;
  let irrigation=+document.getElementById("irrigation").value||0;

  let expense=seeds+fertilizer+labour+irrigation;
  let income=quantity*rate;
  let profit=income-expense;

  let data={
    village:document.getElementById("village").value,
    crop,
    season:document.getElementById("season").value,
    seeds,fertilizer,labour,irrigation,
    expense,income,profit
  };

  records.push(data);
  localStorage.setItem("farmData",JSON.stringify(records));
  displayRecords();
  clearForm();
}

function displayRecords(){

  let table=document.getElementById("tableData");
  table.innerHTML="";

  let total=0,seed=0,fert=0,lab=0,irr=0;
  let top={name:"-",profit:-Infinity};

  records.forEach((item,i)=>{

    total+=item.profit;
    seed+=item.seeds;
    fert+=item.fertilizer;
    lab+=item.labour;
    irr+=item.irrigation;

    if(item.profit>top.profit) top={name:item.crop,profit:item.profit};

    table.innerHTML+=`
    <tr>
    <td>${item.village}</td>
    <td>${item.crop}</td>
    <td>${item.season}</td>
    <td>₹${item.expense}</td>
    <td>₹${item.income}</td>
    <td class="${item.profit>=0?'profit':'loss'}">₹${item.profit}</td>
    <td><button onclick="deleteRecord(${i})">Delete</button></td>
    </tr>`;
  });

  document.getElementById("totalProfit").innerText=total;
  document.getElementById("seedTotal").innerText=seed;
  document.getElementById("fertTotal").innerText=fert;
  document.getElementById("labourTotal").innerText=lab;
  document.getElementById("irrTotal").innerText=irr;
  document.getElementById("topCropBox").innerText="Top Crop: "+top.name;
}

function deleteRecord(i){
  records.splice(i,1);
  localStorage.setItem("farmData",JSON.stringify(records));
  displayRecords();
}

function clearForm(){
  document.querySelectorAll("input").forEach(i=>i.value="");
}

function resetData(){
  localStorage.clear();
  records=[];
  displayRecords();
}

function setEnglish(){ currentLang="en"; loadSeasons(); }
function setKannada(){ currentLang="kn"; loadSeasons(); }

function loadSeasons(){
  let s=document.getElementById("season");
  s.innerHTML="";
  seasons[currentLang].forEach(x=>s.innerHTML+=`<option>${x}</option>`);
}

loadSeasons();
displayRecords();

</script>

</body>
</html>
